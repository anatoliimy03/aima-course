<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0F1922" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#0F1922" stop-opacity="0.25"/>
      <stop offset="0.74" stop-color="#0F1922" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0F1922"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F45B5A"/>
      <stop offset="1" stop-color="#D9363E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="24" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <clipPath id="photoClip">
      <rect x="0" y="0" width="1080" height="1180" rx="0"/>
    </clipPath>
    <style>
      .display { font-family: Manrope, Arial, sans-serif; }
      .body { font-family: Onest, Arial, sans-serif; }
      .eyebrow { font-size: 30px; font-weight: 800; letter-spacing: 2.8px; }
      .headline { font-size: 84px; font-weight: 800; letter-spacing: -3.4px; }
      .sub { font-size: 36px; font-weight: 500; }
      .small { font-size: 28px; font-weight: 500; }
    </style>
  </defs>

  <rect width="1080" height="1920" fill="#0F1922"/>
  <g clip-path="url(#photoClip)">
    <image href="../online-shop-21-days/photo-v2.png" x="-255" y="0" width="1640" height="1230" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1080" height="1180" fill="#0F1922" opacity="0.18"/>
    <rect x="0" y="0" width="1080" height="1180" fill="url(#fade)"/>
  </g>

  <g transform="translate(72 90)">
    <rect x="0" y="0" width="420" height="74" rx="37" fill="#0F1922" opacity="0.72"/>
    <text x="34" y="49" class="display eyebrow" fill="#85B7EB">ВІД АВТОРА КУРСУ</text>
  </g>

  <g transform="translate(72 1035)">
    <text x="0" y="0" class="display headline" fill="#FFFFFF">
      <tspan x="0" dy="0">Запусти</tspan>
      <tspan x="0" dy="95">інтернет-магазин</tspan>
      <tspan x="0" dy="95">з нуля</tspan>
    </text>

    <g transform="translate(0 340)" filter="url(#shadow)">
      <rect x="0" y="0" width="936" height="250" rx="36" fill="#FFFFFF"/>
      <text x="44" y="70" class="body sub" fill="#0F1922">
        <tspan x="44" dy="0">21 урок по створенню магазину:</tspan>
      </text>
      <g transform="translate(44 120)">
        <rect x="0" y="0" width="250" height="58" rx="29" fill="#E6F1FB"/>
        <text x="28" y="39" class="body small" fill="#185FA5">без коду</text>
        <rect x="278" y="0" width="250" height="58" rx="29" fill="#E6F1FB"/>
        <text x="306" y="39" class="body small" fill="#185FA5">оплата</text>
        <rect x="556" y="0" width="250" height="58" rx="29" fill="#E6F1FB"/>
        <text x="584" y="39" class="body small" fill="#185FA5">доставка</text>
      </g>
    </g>
  </g>

  <g transform="translate(72 1690)">
    <rect x="0" y="0" width="936" height="124" rx="24" fill="url(#cta)"/>
    <text x="468" y="80" text-anchor="middle" class="display sub" fill="#FFFFFF" font-weight="800">Дізнатись більше</text>
  </g>

  <g transform="translate(72 1846)">
    <text x="0" y="0" class="display small" fill="#85B7EB" font-weight="800">Aima</text>
    <text x="88" y="0" class="body small" fill="#FFFFFF" opacity="0.66">Анатолій Маліновський</text>
  </g>
</svg>
